esphome:
  name: ir1

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

logger:

api:

ota:
  - platform: esphome

remote_transmitter:
  pin:
    number: GPIO4
    inverted: false
  carrier_duty_percent: 50%

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
  dump: all

button:
  - platform: template
    name: "Select"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xD52A

  - platform: template
    name: "TV Back"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0x19E6 
        #  command: 0x9966

  - platform: template
    name: "TV Home"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xFC03

  - platform: template
    name: "TV Up"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xE619

  - platform: template
    name: "TV Down"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xCC33 

  - platform: template
    name: "TV Left"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xE11E 

  - platform: template
    name: "TV Right"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xD22D

  - platform: template
    name: "TV Play-Pause"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xB34C

  - platform: template
    name: "TV Rewind"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xCB34
  
  - platform: template
    name: "TV Fast Forward"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xAA55

  - platform: template
    name: "TV Power"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0xE817

  - platform: template
    name: "TV Star Options"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0x9E61 

  - platform: template
    name: "TV Replay"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xC9EA
          command: 0x8778 




